<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Lab Dashboard</title>
<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<!-- Google Fonts for modern look -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --primary-color: #4f46e5;
  --secondary-color: #f3f4f6;
  --alert-color: #ef4444;
  --text-color: #111827;
}
body {
  font-family: 'Inter', sans-serif;
  background: var(--secondary-color);
  color: var(--text-color);
  margin: 0;
  padding: 20px;
}
h2, h3 { color: var(--primary-color); }
button {
  background: var(--primary-color);
  color: white;
  border: none;
  border-radius: 6px;
  padding: 10px 18px;
  cursor: pointer;
  transition: 0.2s;
}
button:hover { background: #4338ca; }
input { padding: 8px; border-radius: 6px; border: 1px solid #d1d5db; }
#ai-output {
  background:white; padding:12px; border-radius:8px; max-height:300px; overflow-y:auto;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}
canvas { background:white; border-radius:8px; margin-top:20px; padding:10px; box-shadow:0 2px 6px rgba(0,0,0,0.1); }
.alerts {
  background: var(--alert-color);
  padding:6px 10px;
  margin-top:6px;
  border-radius:4px;
  color:white;
  font-weight:600;
}
.container { max-width: 900px; margin:auto; }
.flex { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:10px; }
</style>
</head>
<body>
<div class="container">
<h2>AI Lab Dashboard</h2>

<div class="flex">
  <input type="file" id="csvFile" accept=".csv">
  <button onclick="processCSV()">Analyze CSV</button>
</div>

<h3>AI Analysis</h3>
<pre id="ai-output">Results will appear here...</pre>

<h3>Alerts</h3>
<div id="alerts"></div>

<h3>Trends</h3>
<canvas id="trendChart" width="800" height="400"></canvas>

<script src="/dashboard.js"></script>
</div>
</body>
</html>
