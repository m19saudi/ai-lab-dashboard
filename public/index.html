<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Lab Dashboard</title>
<style>
body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
h1 { text-align: center; }
#uploadSection { text-align: center; margin-bottom: 20px; }
#analysisOutput { background: #fff; padding: 10px; border-radius: 6px; margin-top: 20px; white-space: pre-line; }
canvas { max-width: 100%; margin-top: 20px; background: #fff; border-radius: 6px; padding: 10px; }
</style>
</head>
<body>

<h1>AI Lab Dashboard</h1>

<div id="uploadSection">
  <input type="file" id="csvFile" accept=".csv">
  <button id="analyzeBtn">Analyze CSV</button>
</div>

<div id="analysisOutput"></div>
<canvas id="trendChart"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
let chart; // Global chart variable

document.getElementById("analyzeBtn").addEventListener("click", async () => {
  const fileInput = document.getElementById("csvFile");
  if (!fileInput.files.length) return alert("Please upload a CSV file.");

  const file = fileInput.files[0];
  const text = await file.text();
  const rows = text.trim().split("\n");
  const headers = rows[0].split(",");
  const data = rows.slice(1).map(row => {
    const values = row.split(",");
    return {
      SampleID: values[0],
      pH: parseFloat(values[1]),
      Ca: parseFloat(values[2]),
      Mg: parseFloat(values[3]),
      Cl: parseFloat(values[4])
    };
  });

  // Send all rows to AI API
  const response = await fetch("/api/hf_ai", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ data })
  });

  const result = await response.json();

  // Split AI response into separate lines
  const aiResponse = result.text;
  const lines = aiResponse.split("\n");
  const outputDiv = document.getElementById("analysisOutput");
  outputDiv.innerHTML = "";
  lines.forEach(line => {
    const p = document.createElement("p");
    p.textContent = line;
    outputDiv.appendChild(p);
  });

  // Prepare data for trend chart (example: using Ca values)
  const labels = data.map(d => d.SampleID);
  const caValues = data.map(d => d.Ca);

  if (chart) chart.destroy();
  const ctx = document.getElementById("trendChart").getContext("2d");
  chart = new Chart(ctx, {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: "Calcium (Ca) mg/L",
        data: caValues,
        borderColor: caValues.map(v => v > 500 ? "red" : "green"),
        backgroundColor: "rgba(0,0,0,0)",
        tension: 0.2,
        pointRadius: 6,
        pointBackgroundColor: caValues.map(v => v > 500 ? "red" : "green")
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: true },
        tooltip: { mode: 'index', intersect: false }
      },
      scales: { y: { beginAtZero: true } }
    }
  });
});
</script>

</body>
</html>
